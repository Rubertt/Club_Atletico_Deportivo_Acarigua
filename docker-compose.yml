# ===========================================================================
# Stack de desarrollo/producción del Club Atlético Deportivo Acarigua
#
# Uso:
#   docker compose up -d --build
#   docker compose logs -f app
#   docker compose exec app php database/install.php --fresh
#   docker compose down          (conserva datos)
#   docker compose down -v       (borra volúmenes — pierde la BD)
#
# Para personalizar puertos/credenciales sin editar este archivo:
#   cp .env.docker.example .env.docker
#   docker compose --env-file .env.docker up -d
#
# IMPORTANTE: este compose NO usa el archivo `.env` del proyecto (ese es para
# el PHP local sin Docker). Usa variables inline o .env.docker explícito.
# ===========================================================================
services:
  db:
    image: mariadb:11
    container_name: cada_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${CADA_DB_ROOT_PASSWORD:-cada_root_2026}
      MARIADB_DATABASE: ${CADA_DB_NAME:-club_atletico_db_normalized}
      MARIADB_USER: ${CADA_DB_USER:-cada_user}
      MARIADB_PASSWORD: ${CADA_DB_PASSWORD:-cada_pass_2026}
    ports:
      - "${CADA_DB_HOST_PORT:-3307}:3306"
    volumes:
      - cada_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p$$MARIADB_ROOT_PASSWORD || mysqladmin ping -h localhost -u root -p$$MARIADB_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - cada_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cada_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: "Club Atlético Deportivo Acarigua"
      APP_ENV: ${CADA_APP_ENV:-production}
      APP_DEBUG: ${CADA_APP_DEBUG:-false}
      APP_URL: ${CADA_APP_URL:-http://localhost:8080}
      APP_TIMEZONE: America/Caracas
      # Conexión a la BD del stack (valores fijos — no leen del .env del proyecto)
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${CADA_DB_NAME:-club_atletico_db_normalized}
      DB_USER: ${CADA_DB_USER:-cada_user}
      DB_PASS: ${CADA_DB_PASSWORD:-cada_pass_2026}
      DB_ROOT_PASSWORD: ${CADA_DB_ROOT_PASSWORD:-cada_root_2026}
      # Seguridad
      JWT_SECRET: ${CADA_JWT_SECRET:-change_me_to_64_hex_chars_in_production}
      JWT_TTL: 7200
      JWT_REFRESH_TTL: 604800
      UPLOAD_MAX_SIZE: 2097152
      UPLOAD_ALLOWED_MIME: image/jpeg,image/png,image/webp
      # Auto-instalador: crea schema + seeds + admin la primera vez
      AUTO_INSTALL_DB: "true"
      ADMIN_EMAIL: ${CADA_ADMIN_EMAIL:-admin@cada.com}
      ADMIN_PASSWORD: ${CADA_ADMIN_PASSWORD:-Admin2026!}
    ports:
      - "${CADA_APP_HOST_PORT:-8080}:80"
    volumes:
      # Persistir subidas y logs fuera del contenedor
      - cada_uploads:/var/www/html/public/assets/uploads
      - cada_logs:/var/www/html/storage/logs
    networks:
      - cada_net

  # ---------------------------------------------------------------------------
  # phpMyAdmin (opcional). Habilitar con:
  #   docker compose --profile tools up -d
  # ---------------------------------------------------------------------------
  phpmyadmin:
    image: phpmyadmin:5
    container_name: cada_pma
    restart: unless-stopped
    profiles: ["tools"]
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 128M
    ports:
      - "${CADA_PMA_HOST_PORT:-8081}:80"
    networks:
      - cada_net

volumes:
  cada_db_data:
  cada_uploads:
  cada_logs:

networks:
  cada_net:
    driver: bridge
