<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Archivos sensibles nunca deben servirse
    <FilesMatch "^\.(env|htaccess|gitignore|git.*)$">
        Require all denied
    </FilesMatch>

    # Denegar acceso directo a vendor/, app/, database/, storage/, config/
    <DirectoryMatch "^/var/www/html/(vendor|app|database|storage|config)">
        Require all denied
    </DirectoryMatch>

    # Caché para assets estáticos
    <LocationMatch "^/assets/.*\.(css|js|png|jpg|jpeg|gif|svg|webp|ico|woff|woff2|ttf)$">
        Header set Cache-Control "public, max-age=2592000"
    </LocationMatch>

    # Compresión
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css application/javascript application/json
    </IfModule>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
